{% extends "base.html" %}
{% block content %}
<h1 class="title">Hello, {{ username }}!</h1>
<h2 class="subtitle">Upload or record your voice</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" accept=".wav">
    <button class="button is-primary mt-2">Analyze Upload</button>
</form>

<hr>

<button id="startBtn" class="button is-success mt-3">Start Recording</button>
<button id="stopBtn" class="button is-danger mt-3" disabled>Stop Recording</button>
<p id="status"></p>
<audio id="audioPlayback" controls style="display:none;"></audio>

<script>
let mediaRecorder;
let audioChunks = [];

document.getElementById('startBtn').onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/wav' });
        const file = new File([blob], 'recorded.wav', { type: 'audio/wav' });
        const audioURL = URL.createObjectURL(blob);
        const audioElem = document.getElementById('audioPlayback');
        audioElem.src = audioURL;
        audioElem.style.display = 'block';
        const formData = new FormData();
        formData.append('file', file);
        document.getElementById('status').innerText = "Uploading...";
        const response = await fetch('{{ url_for("index") }}', { method: 'POST', body: formData });
        const resultText = await response.text();
        document.open();
        document.write(resultText);
        document.close();
    };
    mediaRecorder.start();
    document.getElementById('status').innerText = "Recording...";
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
};

document.getElementById('stopBtn').onclick = () => {
    mediaRecorder.stop();
    document.getElementById('status').innerText = "Processing...";
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
};
</script>

<a href="{{ url_for('logout') }}" class="button is-danger mt-3">Logout</a>
{% endblock %}
